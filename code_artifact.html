<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>급식 정보 알리미</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            gungsuh: ['Gungsuh', '궁서', 'serif'],
          }
        }
      }
    }
  </script>

  <!-- React 및 Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }
    .animate-snow {
      animation: fall 6s linear infinite;
    }
    /* 스크롤바 커스텀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-slate-950 transition-colors duration-500">

  <div id="root"></div>

  <!-- React 컴포넌트 소스 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 외부 Lucide 라이브러리 상태에 영향받지 않는 100% 순수 인라인 SVG 아이콘 컴포넌트
    const Icon = ({ name, size = 24, strokeWidth = 1.5, className = "", fill = "none" }) => {
      const paths = {
        settings: (
          <g>
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </g>
        ),
        school: (
          <g>
            <path d="m22 10-10-5L2 10l10 5Z" />
            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
          </g>
        ),
        trophy: (
          <g>
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34" />
            <path d="M12 2a6 6 0 0 0-6 6v1c0 2.2 1.8 4 4 4h4c2.2 0 4-1.8 4-4V8a6 6 0 0 0-6-6z" />
          </g>
        ),
        'chevron-left': <path d="m15 18-6-6 6-6" />,
        'chevron-right': <path d="m9 18 6-6-6-6" />,
        moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
        sun: (
          <g>
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93 1.41 1.41M17.66 17.66 1.41 1.41M2 12h2M20 12h2M6.34 17.66-1.41 1.41M19.07 4.93-1.41 1.41" />
          </g>
        ),
        plus: <path d="M5 12h14M12 5v14" />,
        'trash-2': (
          <g>
            <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            <line x1="10" x2="10" y1="11" y2="17" />
            <line x1="14" x2="14" y1="11" y2="17" />
          </g>
        ),
        'loader-2': <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
        'refresh-cw': (
          <g>
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
            <path d="M16 3h5v5" />
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
            <path d="M8 21H3v-5" />
          </g>
        ),
        star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />,
        'bell-ring': (
          <g>
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
            <path d="M4 2C2.8 3.7 2 5.7 2 8" />
            <path d="M22 8c0-2.3-.8-4.3-2-6" />
          </g>
        ),
        search: (
          <g>
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </g>
        ),
        'check-circle-2': (
          <g>
            <circle cx="12" cy="12" r="10" />
            <path d="m9 12 2 2 4-4" />
          </g>
        ),
        'map-pin': (
          <g>
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
            <circle cx="12" cy="12" r="3" />
          </g>
        ),
        flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />,
        check: <path d="M20 6 9 17l-5-5" />,
        award: (
          <g>
            <circle cx="12" cy="8" r="7" />
            <path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12" />
          </g>
        ),
        'calendar-days': (
          <g>
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
            <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01" />
          </g>
        ),
        clock: (
          <g>
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </g>
        ),
        x: <path d="M18 6 6 18M6 6l12 12" />,
        utensils: (
          <g>
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v4M12 15v7M9 15v7" />
            <path d="M17 12h-3V2a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v10Z" />
            <path d="M17 15v7" />
          </g>
        )
      };

      const kebabName = name
        .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
        .replace(/([a-zA-Z])([0-9])/g, '$1-$2')
        .toLowerCase();

      const renderedPath = paths[kebabName] || null;

      return (
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          width={size} 
          height={size} 
          viewBox="0 0 24 24" 
          fill={fill} 
          stroke="currentColor" 
          strokeWidth={strokeWidth} 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={`lucide lucide-${kebabName} ${className} ${kebabName === 'loader-2' ? 'animate-spin' : ''}`}
        >
          {renderedPath}
        </svg>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('school');
      const [darkMode, setDarkMode] = useState(false);
      const [selectedDate, setSelectedDate] = useState(new Date());
      
      // 기념일 체크 로직 (실제 오늘 기준)
      const today = new Date();
      const tMonth = today.getMonth() + 1;
      const tDate = today.getDate();
      const tYear = today.getFullYear();

      const isHangeulDay = tMonth === 10 && tDate === 9; 
      const isChildrensDay = tMonth === 5 && tDate === 5; 
      const isChristmas = tMonth === 12 && tDate === 25; 
      const isIndepDay = tMonth === 3 && tDate === 1; 
      const isNewYear = tMonth === 1 && tDate === 1;
      const isAprilFools = tMonth === 4 && tDate === 1;

      const [isExploded, setIsExploded] = useState(false);

      // 학교 및 급식 상태
      const [regionCode, setRegionCode] = useState("");
      const [schoolNameInput, setSchoolNameInput] = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [isSearching, setIsSearching] = useState(false);
      const [mySchool, setMySchool] = useState(null); 
      const [mealData, setMealData] = useState(null);
      const [isLoadingMeal, setIsLoadingMeal] = useState(false);

      // 음식 상세 모달 상태 (AI 이미지 관련 변수 및 상태 전면 제거)
      const [selectedFood, setSelectedFood] = useState(null);

      // 주말 및 휴일 대체 추천 상태 (AI 이미지 관련 변수 및 상태 전면 제거)
      const [recommendation, setRecommendation] = useState(null);

      // 도전(챌린지) 상태
      const [streak, setStreak] = useState(0); 
      const [lastClearDate, setLastClearDate] = useState(null);
      const [userChallenges, setUserChallenges] = useState([
        { id: 1, title: "급식 남기지 않기", isDefault: true, completedToday: false }
      ]);
      const [newChallengeTitle, setNewChallengeTitle] = useState("");

      // D-Day 상태
      const [ddays, setDdays] = useState([
        { id: 1, title: "기말고사", date: "2026-07-01" },
        { id: 2, title: "여름방학", date: "2026-07-20" }
      ]);
      const [newDdayTitle, setNewDdayTitle] = useState("");
      const [newDdayDate, setNewDdayDate] = useState("");

      // 선호 메뉴 상태
      const [favoriteFoods, setFavoriteFoods] = useState(["치킨", "마라탕", "돈가스"]);
      const [newFoodInput, setNewFoodInput] = useState("");

      const allergyMap = {
        "1": "난류", "2": "우유", "3": "메밀", "4": "땅콩", "5": "대두",
        "6": "밀", "7": "고등어", "8": "게", "9": "새우", "10": "돼지고기",
        "11": "복숭아", "12": "토마토", "13": "아황산류", "14": "호두", "15": "닭고기",
        "16": "쇠고기", "17": "오징어", "18": "조개류", "19": "잣"
      };

      const lunchMenus = ["치킨까스", "마라탕", "떡볶이", "치즈버거", "짜장면", "제육덮밥", "쌀국수", "연어초밥", "토마토 파스타"];

      // 다크모드 동적 클래스 토글
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const getAllergyStyle = (name) => {
        const palette = [
          { bg: 'bg-rose-100 text-rose-600 dark:bg-rose-950/40 dark:text-rose-400 border-rose-200 dark:border-rose-900/50' },
          { bg: 'bg-sky-100 text-sky-600 dark:bg-sky-950/40 dark:text-sky-400 border-sky-200 dark:border-sky-900/50' },
          { bg: 'bg-emerald-100 text-emerald-600 dark:bg-emerald-950/40 dark:text-emerald-400 border-emerald-200 dark:border-emerald-900/50' },
          { bg: 'bg-amber-100 text-amber-600 dark:bg-amber-950/40 dark:text-amber-400 border-amber-200 dark:border-amber-900/50' },
          { bg: 'bg-violet-100 text-violet-600 dark:bg-violet-950/40 dark:text-violet-400 border-violet-200 dark:border-violet-900/50' },
          { bg: 'bg-orange-100 text-orange-600 dark:bg-orange-950/40 dark:text-orange-400 border-orange-200 dark:border-orange-900/50' },
        ];
        const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
        return palette[hash % palette.length];
      };

      const regions = [
        { name: "서울", code: "B10" }, { name: "부산", code: "C10" }, { name: "대구", code: "D10" },
        { name: "인천", code: "E10" }, { name: "광주", code: "F10" }, { name: "대전", code: "G10" },
        { name: "울산", code: "H10" }, { name: "세종", code: "I10" }, { name: "경기", code: "J10" },
        { name: "강원", code: "K10" }, { name: "충북", code: "M10" }, { name: "충남", code: "N10" },
        { name: "전북", code: "P10" }, { name: "전남", code: "Q10" }, { name: "경북", code: "R10" },
        { name: "경남", code: "S10" }, { name: "제주", code: "T10" }
      ];

      const convertAllergyToArray = (allergyString) => {
        if (!allergyString) return [];
        const numbers = allergyString.match(/\d+/g);
        return numbers ? numbers.map(num => allergyMap[num] || num) : [];
      };

      const calculateDday = (targetDate) => {
        const todayDate = new Date();
        todayDate.setHours(0, 0, 0, 0);
        const target = new Date(targetDate);
        target.setHours(0, 0, 0, 0);
        const diffTime = target - todayDate;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays === 0) return "D-Day";
        return diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`;
      };

      const openFoodModal = (item) => {
        setSelectedFood(item);
      };

      const searchSchool = async () => {
        if (!regionCode || !schoolNameInput) return;
        setIsSearching(true);
        setSearchResults([]);
        try {
          const url = `https://open.neis.go.kr/hub/schoolInfo?Type=json&pIndex=1&pSize=20&ATPT_OFCDC_SC_CODE=${regionCode}&SCHUL_NM=${encodeURIComponent(schoolNameInput)}`;
          const response = await fetch(url);
          const data = await response.json();
          if (data.schoolInfo) {
            setSearchResults(data.schoolInfo[1].row.map(item => ({
              name: item.SCHUL_NM, 
              code: item.SD_SCHUL_CODE, 
              officeCode: item.ATPT_OFCDC_SC_CODE, 
              address: item.ORG_RDNMA,
              type: item.SCHUL_KND_SC_NM
            })));
          }
        } catch (e) { console.error(e); }
        setIsSearching(false);
      };

      const fetchMeal = async () => {
        if (!mySchool) return;
        setIsLoadingMeal(true);
        setRecommendation(null);
        const dateStr = selectedDate.toISOString().split('T')[0].replace(/-/g, '');
        try {
          const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${mySchool.officeCode}&SD_SCHUL_CODE=${mySchool.code}&MLSV_YMD=${dateStr}`;
          const response = await fetch(url);
          const data = await response.json();
          if (data.mealServiceDietInfo) {
            const rawMeal = data.mealServiceDietInfo[1].row[0].DDISH_NM;
            const items = rawMeal.split('<br/>').map(item => {
              const match = item.match(/(.*?)\s*\(([\d.]+)\)/);
              return match 
                ? { name: match[1].trim(), allergies: convertAllergyToArray(match[2]) }
                : { name: item.trim(), allergies: [] };
            });
            setMealData({ items, calorie: data.mealServiceDietInfo[1].row[0].CAL_INFO });
          } else {
            setMealData(null);
            // 식단이 없거나 주말인 경우 텍스트 추천 메뉴 설정
            const day = selectedDate.getDay();
            if (day === 0 || day === 6 || !data.mealServiceDietInfo) {
              const randomPick = lunchMenus[Math.floor(Math.random() * lunchMenus.length)];
              setRecommendation({ name: randomPick });
            }
          }
        } catch (e) { setMealData(null); }
        setIsLoadingMeal(false);
      };

      useEffect(() => { fetchMeal(); }, [mySchool, selectedDate]);

      const toggleChallenge = (id) => {
        const todayStr = new Date().toDateString();
        setUserChallenges(userChallenges.map(c => {
          if (c.id === id) {
            const newState = !c.completedToday;
            if (c.isDefault && newState) {
              if (lastClearDate !== todayStr) {
                setStreak(prev => prev + 1);
                setLastClearDate(todayStr);
              }
            } else if (c.isDefault && !newState) {
              if (lastClearDate === todayStr) {
                setStreak(prev => Math.max(0, prev - 1));
                setLastClearDate(null);
              }
            }
            return { ...c, completedToday: newState };
          }
          return c;
        }));
      };

      const addChallenge = () => {
        if (!newChallengeTitle.trim()) return;
        setUserChallenges([...userChallenges, {
          id: Date.now(),
          title: newChallengeTitle,
          isDefault: false,
          completedToday: false
        }]);
        setNewChallengeTitle("");
      };

      const addDday = () => {
        if (!newDdayTitle.trim() || !newDdayDate) return;
        setDdays([...ddays, {
          id: Date.now(),
          title: newDdayTitle,
          date: newDdayDate
        }]);
        setNewDdayTitle("");
        setNewDdayDate("");
      };

      const hasFavorite = mealData?.items?.some(item => 
        favoriteFoods.some(fav => item.name.includes(fav))
      );

      // 오늘 식단에 나오는 최애 메뉴들 목록 추출
      const matchingFavorites = mealData?.items
        ?.filter(item => favoriteFoods.some(fav => item.name.includes(fav)))
        ?.map(item => item.name);

      // 만우절용 탭 차단
      const handleTabSwitch = (target) => {
        if (isAprilFools && Math.random() < 0.5) {
          setIsExploded(true);
        } else {
          setActiveTab(target);
        }
      };

      return (
        <div className={`min-h-screen max-w-md mx-auto relative overflow-hidden transition-all duration-500 shadow-2xl pb-16
          ${darkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-gray-800'} ${isHangeulDay ? 'font-serif' : 'font-sans'}`}>
          
          {/* 기념일 효과 레이어 */}
          <div className="absolute inset-0 pointer-events-none z-0">
            {isChildrensDay && Array.from({length: 12}).map((_, i) => (
              <div key={i} className="absolute bottom-[-100px] animate-bounce opacity-30" style={{
                left: `${Math.random() * 100}%`,
                animationDuration: `${3 + Math.random() * 3}s`,
                animationDelay: `${Math.random() * 2}s`
              }}><div className={`w-8 h-10 rounded-full ${['bg-red-400', 'bg-yellow-400', 'bg-blue-400'][i%3]}`}></div></div>
            ))}
            {isChristmas && Array.from({length: 20}).map((_, i) => (
              <div key={i} className="absolute top-[-20px] text-blue-200/40 animate-snow" style={{
                left: `${Math.random() * 100}%`,
                animationDuration: `${5 + Math.random() * 5}s`,
                animationDelay: `${Math.random() * 5}s`
              }}>❄</div>
            ))}
            {isIndepDay && (
              <div className="absolute inset-0 flex items-center justify-center opacity-[0.05]">
                 <svg viewBox="0 0 100 100" className="w-64 h-64 rotate-12">
                   <path d="M50 20 A15 15 0 0 1 50 50 A15 15 0 0 0 50 80" stroke="#CD2E3A" fill="none" strokeWidth="6" />
                   <path d="M50 20 A15 15 0 0 0 50 50 A15 15 0 0 1 50 80" stroke="#0047A0" fill="none" strokeWidth="6" />
                 </svg>
              </div>
            )}
            {isNewYear && (
              <div className="absolute inset-0 flex items-center justify-center opacity-10 select-none">
                <span className="text-[120px] font-black text-blue-500 animate-pulse">{tYear}</span>
              </div>
            )}
          </div>

          {/* Header */}
          <header className={`relative z-10 sticky top-0 border-b px-5 py-4 flex justify-between items-center transition-colors ${darkMode ? 'bg-slate-900/90 backdrop-blur-md border-slate-800' : 'bg-white/90 backdrop-blur-md border-gray-100'}`}>
            <div className="w-10 flex items-center justify-center">
              {isExploded ? (
                <button onClick={() => setIsExploded(false)} className="p-2.5 bg-indigo-600 text-white rounded-2xl shadow-lg hover:rotate-180 transition-transform duration-500">
                  <Icon name="RefreshCw" size={16} strokeWidth={1.5} />
                </button>
              ) : hasFavorite && !isLoadingMeal && (
                <div className="animate-bounce text-orange-500"><Icon name="BellRing" size={20} strokeWidth={1.5} /></div>
              )}
            </div>
            <h1 className="text-xl font-black tracking-tight italic">
              {isHangeulDay ? '나랏밥 알리미' : activeTab === 'school' ? '오늘의 급식' : activeTab === 'settings' ? '설정' : '도전 기록'}
            </h1>
            <button onClick={() => setDarkMode(!darkMode)} className={`p-2 rounded-xl transition-colors ${darkMode ? 'bg-slate-800 text-yellow-400' : 'bg-gray-100 text-gray-400'}`}>

            <nav className={`fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t px-6 py-4 flex justify-around items-center z-20 rounded-t-[40px] shadow-2xl transition-colors ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-100'}`}>
              {[
                { id: 'settings', label: '설정', icon: 'settings' },
                { id: 'school', label: '급식', icon: 'school' },
                { id: 'challenge', label: '도전', icon: 'trophy' },
              ].map((item) => {
                const isActive = activeTab === item.id;
                const IconComponent = item.icon;
                return (
                  <button 
                    key={item.id} 
                    onClick={() => handleTabSwitch(item.id)} 
                    className={`relative flex items-center justify-center transition-all duration-300 px-4 py-2 rounded-2xl
                      ${isActive 
                        ? (darkMode ? 'bg-slate-800 text-white w-28' : 'bg-slate-100 text-slate-800 w-28') 
                        : 'text-gray-300 w-12'}`}
                  >
                    <div className="flex items-center gap-2">
                      <Icon name={IconComponent} size={24} strokeWidth={isActive ? 2 : 1.5} />
                      {isActive && <span className="text-[13px] font-normal animate-in fade-in slide-in-from-left-2">{item.label}</span>}
                    </div>
                  </button>
                );
              })}
            </nav>
          ) : (
            <div className="fixed bottom-12 left-1/2 -translate-x-1/2 bg-red-600 text-white px-10 py-5 rounded-[32px] font-black shadow-2xl animate-bounce z-50 flex items-center space-x-4 border-4 border-white/20">
              <span className="text-2xl">🤡</span>
              <div className="text-left">
                <p className="text-xs opacity-80 uppercase font-black">만우절</p>
                <p className="text-sm">버튼이 펑! 속았지롱!</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    // React 18 createRoot 렌더링 방식 적용
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
